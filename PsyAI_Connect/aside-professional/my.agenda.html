<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:wght@600;700&display=swap" rel="stylesheet">
    <title>PsyAI Connect | Mi Agenda</title>
    <script>
        (function() {
            try {
                var t = localStorage.getItem('theme');
                var d = t === 'dark';
                document.documentElement.style.backgroundColor = d ? '#030610' : '#ffffff';
                document.documentElement.style.colorScheme = d ? 'dark' : 'light';
            } catch(e) {}
        })();
    </script>
    <script src="../js/shared/theme-inline.js"></script>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- CSS propios -->
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../responsive/aside.css">
    <link rel="stylesheet" href="../responsive/professional.css">
    
    <script src="../js/shared/theme.js"></script>
    <script src="../js/shared/localStorage-detector.js"></script>

</head>
<body class="aside-professional">

<button class="toggle-btn" id="toggleSidebar"><i class="fas fa-bars"></i></button>

<div class="d-flex">
    <!-- Sidebar -->
    <aside class="sidebar d-flex flex-column position-fixed shadow-sm">
        <div class="sidebar__logo text-center mt-3">
            <img src="../img/Logo.jpg" alt="PsyAI Connect Logo" class="img-fluid rounded-circle" width="100">
            <h5 class="mt-2 fw-bold text-primary">PsyAI Connect</h5>
        </div>

        <nav class="nav flex-column mt-4">
            <a href="../professional.dashboard.html" class="nav-link">
                <i class="fas fa-home me-2"></i> Dashboard
            </a>
            <a href="patients.html" class="nav-link">
                <i class="fas fa-users me-2"></i>Pacientes y Diagnósticos
            </a>
            <a href="my.agenda.html" class="nav-link active">
                <i class="fas fa-calendar-check me-2"></i> Mi Agenda
            </a>
            <a href="reports.html" class="nav-link">
                <i class="fas fa-chart-line me-2"></i> Reportes
            </a>
            <a href="my.profile2.html" class="nav-link mt-3 border-top pt-3">
                <i class="fas fa-user-circle me-2"></i> Mi Perfil
            </a>
        </nav>

        <div class="sidebar__footer mt-auto mb-3 text-center">
            <div class="theme-switch-container mb-2">
                <i class="fa-solid fa-sun theme-icon sun" id="sun-icon"></i>
                <button id="theme-toggle" title="Cambiar modo"></button>
                <i class="fa-solid fa-moon theme-icon moon" id="moon-icon"></i>
            </div>
          <a href="#" onclick="cerrarSesion()" class="btn btn-outline-danger btn-sm w-75"><i class="fas fa-sign-out-alt me-1"></i> Cerrar Sesión</a>
        </div>
    </aside>

    <!-- Main content -->
    <main class="main-content flex-grow-1 ms-250 p-4 bg-light">
        <!-- Header -->
        <header class="main-header d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
            <h1 class="h3 fw-bold text-dark mb-0"><i class="fas fa-calendar-alt text-primary me-2"></i> Mi Agenda</h1>
            <div class="user-info d-flex align-items-center">
                <i class="fas fa-bell text-secondary fs-5 me-3"></i>
                <span class="fw-semibold text-dark" id="nombreProfesional">Hola, Dr(a).</span>
            </div>
        </header>

        <!-- Próximas Citas -->
        <section class="card p-4 shadow-sm border-0 mb-4">
            <h5 class="fw-bold text-dark mb-3"><i class="fas fa-clock me-2 text-primary"></i> Próximas Citas</h5>
            <ul class="list-group" id="listaCitas">
  <li class="list-group-item text-muted">Cargando citas...</li>
</ul>
        </section>

        <!-- Formulario Mi Agenda -->
        <section id="agenda" class="card p-4 shadow-sm border-0 mb-5">
            <h5 class="fw-bold text-dark mb-3"><i class="fas fa-calendar-plus me-2 text-primary"></i> Registrar Disponibilidad</h5>
           <form>
  <div class="row g-3">
    <div class="col-md-4">
      <label for="fecha" class="form-label fw-semibold">Fecha:</label>
      <input type="date" id="fecha" class="form-control" name="fecha">
    </div>
    <div class="col-md-4">
      <label for="hora_inicio" class="form-label fw-semibold">Hora inicio:</label>
      <input type="time" id="hora_inicio" class="form-control" name="hora_inicio">
    </div>
    <div class="col-md-4">
      <label for="hora_fin" class="form-label fw-semibold">Hora fin:</label>
      <input type="time" id="hora_fin" class="form-control" name="hora_fin">
    </div>
  </div>

  <button type="button" id="btnDisponibilidad" class="button button--primary w-100 py-2 mt-3">
    <i class="fas fa-plus me-2"></i>Agregar Disponibilidad
  </button>
</form>
        </section>
        <!-- Agendar Cita Manual -->
<section id="agendarCita" class="card p-4 shadow-sm border-0 mb-4">
  <h5 class="fw-bold text-dark mb-3">
    <i class="fas fa-calendar-check me-2 text-success"></i> Agendar Cita con Paciente
  </h5>
  <form>
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label fw-semibold">Profesional:</label>
        <select id="citaProfesional" class="form-control">
          <option value="">Seleccionar profesional...</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Paciente:</label>
        <select id="citaPaciente" class="form-control">
          <option value="">Seleccionar paciente...</option>
        </select>
      </div>
    </div>

    <div class="row g-3 mt-2">
      <div class="col-md-3">
        <label class="form-label fw-semibold">Fecha:</label>
        <input type="date" id="citaFecha" class="form-control">
      </div>
      <div class="col-md-3">
        <label class="form-label fw-semibold">Hora:</label>
        <select id="citaHora" class="form-control">
          <option value="">Selecciona una hora</option>
        </select>
        <small class="text-muted">Duración: 30 minutos</small>
      </div>
      <div class="col-md-3">
        <label class="form-label fw-semibold">Tipo de Cita:</label>
        <select id="citaTipo" class="form-control">
          <option value="">Seleccionar</option>
          <option value="Primera sesión">Primera sesión</option>
          <option value="Seguimiento">Seguimiento</option>
          <option value="Evaluación">Evaluación</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label fw-semibold">Motivo:</label>
        <input type="text" id="citaMotivo" class="form-control" placeholder="Motivo">
      </div>
    </div>

    <button type="button" id="btnAgendarCita" class="button button--success w-100 py-2 mt-3">
    <i class="fas fa-save me-2"></i>Agendar Cita
</button>
  </form>
</section>
    </main>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="../css/custom-alerts.css">
    <script src="../js/shared/alerts.js"></script>
<script src="../js/aside-professional/aside.js"></script>
<script src="../js/auth/logout.js"></script>
    <script src="../js/shared/nombre.usuario.js"></script>
<script src="../js/aside-professional/my.agenda.js"></script>

</body>
</html>
