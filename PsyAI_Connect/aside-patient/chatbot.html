<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PsyAI Connect | Chatbot Emocional</title>
  <script>
      (function() {
          try {
              var t = localStorage.getItem('theme');
              var d = t === 'dark';
              document.documentElement.style.backgroundColor = d ? '#030610' : '#ffffff';
              document.documentElement.style.colorScheme = d ? 'dark' : 'light';
          } catch(e) {}
      })();
  </script>
  <script src="../js/shared/theme-inline.js"></script>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<!-- CSS propios -->
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/theme.css">
<link rel="stylesheet" href="../responsive/aside-patient.css">

<script src="../js/shared/theme.js"></script>
<script src="../js/shared/localStorage-detector.js"></script>
</head>
<body style="background-color: #fff; color: #212529;">
  <div class="d-flex">
    <!-- Sidebar -->
    <aside class="sidebar d-flex flex-column position-fixed shadow-sm">
      <div class="sidebar__logo text-center mt-3">
          <img src="../img/Logo.jpg" alt="PsyAI Connect Logo" class="img-fluid rounded-circle" width="100">
          <h5 class="mt-2 fw-bold text-primary">PsyAI Connect</h5>
      </div>
      <nav class="nav flex-column mt-4">
        <a href="../patient.dashboard.html" class="nav-link">
          <i class="fas fa-home me-2"></i> Dashboard
        </a>
        <a href="chatbot.html" class="nav-link active">
          <i class="fas fa-robot me-2"></i> Chatbot Emocional
        </a>
        <a href="agenda-quotes.html" class="nav-link">
          <i class="fas fa-calendar-alt me-2"></i> Agenda de Citas
        </a>
        <a href="evolution.html" class="nav-link">
          <i class="fas fa-chart-area me-2"></i> Mi Evolución
        </a>
        <a href="my.profile.html" class="nav-link border-top pt-3 mt-3">
          <i class="fas fa-user-circle me-2"></i> Mi Perfil
        </a>
      </nav>

      <div class="sidebar__footer mt-auto mb-3 text-center">
        <div class="theme-switch-container mb-2">
            <i class="fa-solid fa-sun theme-icon sun" id="sun-icon"></i>
            <button id="theme-toggle" title="Cambiar modo"></button>
            <i class="fa-solid fa-moon theme-icon moon" id="moon-icon"></i>
        </div>
       <a href="#" onclick="cerrarSesion()" class="btn btn-outline-danger btn-sm w-75"><i class="fas fa-sign-out-alt me-1"></i> Cerrar Sesión</a>
      </div>
    </aside>

    <!-- Contenido principal -->
    <main class="main-content flex-grow-1 ms-250 p-4">
      <header class="main-header d-flex justify-content-between align-items-center mb-4">
        <h1><i class="fas fa-robot me-2"></i>Chatbot Emocional</h1>
        <div class="user-info d-flex align-items-center">
                <i class="fas fa-bell text-secondary fs-5 me-3"></i>
                <span class="fw-semibold text-dark" id="nombrePaciente">Hola, </span>
            </div>
      </header>

      <!-- Chatbot -->
      <section id="chatbot-section" class="card p-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="mb-0">Asistente Emocional</h5>
        </div>

        <!-- Área de conversación -->
        <div class="border rounded p-3 mb-3" style="height: 350px; overflow-y: auto;">
          <div class="text-muted mb-2">
              <strong>PsyAI:</strong> ¡Hola! Soy tu asistente emocional. ¿Cómo te sientes hoy?
          </div>
          <div class="text-end text-primary mb-2">
            <strong>Tú:</strong> Me siento tranquilo.
          </div>
          <div class="text-muted">
            <strong>PsyAI:</strong> Me alegra escuchar eso. Mantén esa calma durante tu día.
          </div>
        </div>

        <!-- Formulario para enviar mensajes -->
        <form action="#" method="post" class="d-flex">
          <input type="text" name="mensaje" class="form-control me-2" placeholder="Escribe tu mensaje...">
          <button type="submit" class="button button--primary">
            <i class="fas fa-paper-plane"></i>
          </button>
        </form>
      </section>
    </main>
  </div>

  <!-- Bootstrap JS (solo para componentes visuales) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth/auth-guard.js"></script>
  <link rel="stylesheet" href="../css/custom-alerts.css">
  <script src="../js/shared/alerts.js"></script>
  <script src="../js/aside-patient/aside.js"></script>
  <script src="../js/auth/logout.js"></script>
  <script src="../js/shared/nombre.usuario.js"></script>
  <script src="../js/aside-patient/chatbot.js"></script>
</body>
</html>
