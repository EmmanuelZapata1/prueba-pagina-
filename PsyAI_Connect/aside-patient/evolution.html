<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:wght@600;700&display=swap" rel="stylesheet">
    <title>PsyAI Connect | Mi Evolución</title>
    <script>
        (function() {
            try {
                var t = localStorage.getItem('theme');
                var d = t === 'dark';
                document.documentElement.style.backgroundColor = d ? '#030610' : '#ffffff';
                document.documentElement.style.colorScheme = d ? 'dark' : 'light';
            } catch(e) {}
        })();
    </script>
    <script src="../js/shared/theme-inline.js"></script>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- CSS propios -->
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/theme.css">
<link rel="stylesheet" href="../responsive/aside-patient.css">

<link rel="stylesheet" href="../responsive/evolution.css">
<script src="../js/shared/theme.js"></script>
<script src="../js/shared/localStorage-detector.js"></script>
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
    <aside class="sidebar d-flex flex-column position-fixed">
        <div class="sidebar__logo text-center mt-3">
            <img src="../img/Logo.jpg" alt="PsyAI Connect Logo" class="img-fluid rounded-circle" width="100">
            <h5 class="mt-2 fw-bold text-primary">PsyAI Connect</h5>
        </div>
        <nav class="nav flex-column mt-4">
            <a href="../patient.dashboard.html" class="nav-link">
                <i class="fas fa-home me-2"></i> Dashboard
            </a>
            <a href="chatbot.html" class="nav-link">
                <i class="fas fa-robot me-2"></i>Chatbot Emocional
            </a>
            <a href="agenda-quotes.html" class="nav-link">
                <i class="fas fa-calendar-alt me-2"></i> Agenda de Citas
            </a>
            <a href="evolution.html" class="nav-link active">
                <i class="fas fa-chart-area me-2"></i> Mi Evolución
            </a>
            <a href="my.profile.html" class="nav-link border-top pt-3 mt-3">
                <i class="fas fa-user-circle me-2"></i> Mi Perfil
            </a>
        </nav>
        <div class="sidebar__footer mt-auto mb-3 text-center">
            <div class="theme-switch-container mb-2">
                <i class="fa-solid fa-sun theme-icon sun" id="sun-icon"></i>
                <button id="theme-toggle" title="Cambiar modo"></button>
                <i class="fa-solid fa-moon theme-icon moon" id="moon-icon"></i>
            </div>
            <a href="#" onclick="cerrarSesion()" class="btn btn-outline-danger btn-sm w-75"><i class="fas fa-sign-out-alt me-1"></i> Cerrar Sesión</a>
        </div>
    </aside>

        <!-- Main content -->
        <main class="main-content flex-grow-1 ms-250 p-4">
            <header class="main-header d-flex justify-content-between align-items-center mb-4">
                <h1>Mi Evolución</h1>
                <div class="user-info d-flex align-items-center">
                <i class="fas fa-bell text-secondary fs-5 me-3"></i>
                <span class="fw-semibold text-dark" id="nombrePaciente">Hola, </span>
            </div>
            </header>

            <!-- Mi Estado Actual -->
            <section id="mi-estado" class="card p-4 shadow-sm border-0 mb-4">
                <h5 class="fw-bold text-dark mb-3"><i class="fas fa-heart me-2 text-danger"></i>Mi Estado Actual</h5>
                <p id="estadoActual" class="text-muted">Cargando...</p>
            </section>

            <!-- Registrar Mi Evolución -->
            <section id="mi-evolucion" class="card p-4 shadow-sm border-0 mb-4">
    <h5 class="fw-bold text-dark mb-3"><i class="fas fa-chart-line me-2 text-primary"></i>Registrar Mi Evolución</h5>
    <div class="mb-3">
        <label for="estado_emocional" class="form-label fw-semibold">Estado Emocional Actual:</label>
        <select id="estado_emocional" class="form-control">
            <option value="">Seleccionar</option>
            <option value="feliz">Feliz</option>
            <option value="tranquilo">Tranquilo</option>
            <option value="estresado">Estresado</option>
            <option value="ansioso">Ansioso</option>
            <option value="triste">Triste</option>
        </select>
    </div>
    <div class="mb-3">
        <label for="nivel_energia" class="form-label fw-semibold">Nivel de Energía (1-10):</label>
        <input type="number" id="nivel_energia" class="form-control" min="1" max="10" placeholder="Ej: 7" oninput="this.value = Math.min(10, Math.max(1, this.value || ''))">
    </div>
    <div class="mb-3">
        <label for="notas_personales" class="form-label fw-semibold">Notas Personales:</label>
        <textarea id="notas_personales" class="form-control" rows="3" placeholder="Escribe cómo te has sentido esta semana..."></textarea>
    </div>
    <button type="button" id="btnGuardarEvolucion" class="btn btn-primary w-100 py-2 fw-bold"
    style="background:#2196F3 !important;border-color:#2196F3 !important;color:#fff !important;">
    <i class="fas fa-save me-2"></i>Guardar mi evolución
</section>

<!-- Historial -->
<section class="card p-4 shadow-sm border-0">
    <h5 class="fw-bold text-dark mb-3"><i class="fas fa-history me-2 text-success"></i>Historial de Evolución</h5>
    <div class="table-responsive">
        <table class="table align-middle">
            <thead class="table-light">
                <tr>
                    <th>Fecha</th>
                    <th>Estado</th>
                    <th>Energía</th>
                    <th>Notas</th>
                </tr>
            </thead>
            <tbody id="tablaHistorialEvolucion">
                <tr><td colspan="4" class="text-center text-muted">Cargando...</td></tr>
            </tbody>
        </table>
    </div>
</section>
        </main>
    </div>

<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
    <div id="toastEvolucion" class="toast align-items-center text-white border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-semibold" id="toastEvolucionMsg"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>  

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth/auth-guard.js"></script>
    <link rel="stylesheet" href="../css/custom-alerts.css">
    <script src="../js/shared/alerts.js"></script>
    <script src="../js/aside-patient/aside.js"></script>
    <script src="../js/auth/logout.js"></script>
    <script src="../js/shared/nombre.usuario.js"></script>
    <script src="../js/aside-patient/evolution.js"></script>

</body>
</html>
