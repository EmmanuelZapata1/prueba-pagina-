<title>PsyAI Connect | Dashboard Profesional</title>
<script>
    (function() {
        function getTheme() {
            try {
                var c = document.cookie.split(';');
                for (var i = 0; i < c.length; i++) {
                    var x = c[i].trim();
                    if (x.indexOf('theme=') === 0) return x.substring(6);
                }
            } catch(e) {}
            return localStorage.getItem('theme') || 'light';
        }
        var t = getTheme();
        var d = t === 'dark';
        document.documentElement.style.backgroundColor = d ? '#030610' : '#ffffff';
        document.documentElement.style.colorScheme = d ? 'dark' : 'light';
    })();
</script>
<script src="js/shared/theme-inline.js"></script>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<!-- CSS propios -->
    <link rel="stylesheet" href="css/base.css">

    <link rel="stylesheet" href="css/components.css">

<body>

                </a>
                <a href="./aside-professional/my.agenda.html" class="nav-link">

                </a>
                <a href="./aside-professional/reports.html" class="nav-link">

                                <div class="fw-bold actividad-header-title">Actividades Recientes</div>

    <!-- Bootstrap JS -->

    <link rel="stylesheet" href="css/custom-alerts.css">

    <script src="js/shared/aside.js"></script>
    <script src="js/auth/logout.js"></script>
    <script src="js/shared/nombre.usuario.js"></script>
    <script>
async function cargarDashboard() {
    try {
        const res = await fetch('/api/profesional/dashboard', {
            credentials: 'include'
        });
        const data = await res.json();

        if (!data.success) {
            console.error('Error al cargar dashboard:', data.message);
        }

        // Actualizar estadísticas
        document.getElementById('statPacientes').textContent = data.pacientes_activos ?? 0;
        document.getElementById('statCitasHoy').textContent = data.citas_hoy ?? 0;
        document.getElementById('statPendientes').textContent = data.citas_pendientes ?? 0;

        // Obtener actividades de localStorage
        const actividadesLocal = JSON.parse(localStorage.getItem('psyai_actividades_recientes') || '[]');
        
        // Combinar con actividades de la API
        let todasActividades = [];
        
        // Agregar citas de la API
        if (data.actividades && data.actividades.length > 0) {
            todasActividades = data.actividades.map(a => ({
                tipo: 'cita',
                titulo: a.paciente,
                detalle: `${a.tipoCita} · ${a.fecha} ${a.hora}`,
                estado: a.estado,
                timestamp: new Date(`${a.fecha} ${a.hora}`).getTime() || 0
            }));
        }
        
        // Agregar actividades locales (diagnósticos, reportes, etc)
        actividadesLocal.forEach(a => {
            todasActividades.push({
                tipo: a.tipo,
                titulo: a.accion,
                detalle: a.detalle,
                estado: '',
                timestamp: a.timestamp
            });
        });
        
        // Ordenar por timestamp (más reciente primero)
        todasActividades.sort((a, b) => b.timestamp - a.timestamp);
        
        // Limitar a 10 actividades
        todasActividades = todasActividades.slice(0, 10);

        // Renderizar actividades recientes
        const container = document.getElementById('actividadContainer');
        if (todasActividades.length === 0) {
            container.innerHTML = `
                <div class="text-center text-muted py-4">
                    <i class="fas fa-calendar-times fa-2x mb-2"></i>
                    <div>No hay actividades recientes</div>
                </div>`;
            return;
        }

        const estadoBadge = {
            'Pendiente':   'warning',
            'Confirmada':  'success',
            'Cancelada':   'danger',
            'Completada':  'secondary'
        };

        const tipoIcono = {
            'cita': 'fa-calendar-check text-primary',
            'diagnostico': 'fa-stethoscope text-success',
            'reporte': 'fa-chart-line text-info'
        };

        container.innerHTML = todasActividades.map(a => `
            <div class="d-flex align-items-center gap-3 py-2 border-bottom">
                <div class="actividad-icon">
                    <i class="fas ${tipoIcono[a.tipo] || 'fa-clipboard text-secondary'}"></i>
                </div>
                <div class="flex-grow-1">
                    <div class="fw-semibold">${a.titulo}</div>
                    <div class="text-muted small">${a.detalle}</div>
                </div>
                ${a.estado ? `<span class="badge bg-${estadoBadge[a.estado] || 'secondary'}">${a.estado}</span>` : ''}
            </div>
        `).join('');

    } catch (err) {
        console.error('Error de red:', err);
        // Si falla la API, mostrar solo actividades locales
        const actividadesLocal = JSON.parse(localStorage.getItem('psyai_actividades_recientes') || '[]');
        const container = document.getElementById('actividadContainer');
        
        if (actividadesLocal.length === 0) {
            container.innerHTML = `
                <div class="text-center text-muted py-4">
                    <i class="fas fa-calendar-times fa-2x mb-2"></i>
                    <div>No hay actividades recientes</div>
                </div>`;
            return;
        }
        
        const tipoIcono = {
            'diagnostico': 'fa-stethoscope text-success',
            'reporte': 'fa-chart-line text-info'
        };
        
        container.innerHTML = actividadesLocal.slice(0, 10).map(a => `
            <div class="d-flex align-items-center gap-3 py-2 border-bottom">
                <div class="actividad-icon">
                    <i class="fas ${tipoIcono[a.tipo] || 'fa-clipboard text-secondary'}"></i>
                </div>
                <div class="flex-grow-1">
                    <div class="fw-semibold">${a.accion}</div>
                    <div class="text-muted small">${a.detalle}</div>
                </div>
            </div>
        `).join('');
    }
}

// Cargar al entrar a la página
cargarDashboard();

// Escuchar cambios de localStorage desde otras páginas/pestañas
window.addEventListener('storage', (e) => {
    if (e.key === 'psyai_dashboard_update' && e.newValue) {
        cargarDashboard();
    }
});

// Escuchar cambios en la misma pestaña
window.addEventListener('localStorageChange', (e) => {
    if (e.detail.key === 'psyai_dashboard_update') {
        cargarDashboard();
    }
});
</script>
